<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>LACK ontology schema diagram</title>
  <desc>Person on the left connected to Collective on the right by typed directed relations. Sub-property hierarchy shown. Collective-to-Collective self-loops on the right.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Person ── -->
  <rect x="20" y="20" width="34" height="250" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="37" y="145" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 37 145)">Person</text>

  <!-- ── Collective ── -->
  <rect x="386" y="20" width="34" height="250" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="403" y="145" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 403 145)">Collective</text>

  <!-- associatedWith y=38 -->
  <line x1="54" y1="38" x2="386" y2="38" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="218" y="34" text-anchor="middle">associatedWith (symmetric)</text>

  <!-- memberOf y=68 -->
  <line x1="54" y1="68" x2="386" y2="68" stroke="#7F77DD" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#7F77DD" x="218" y="64" text-anchor="middle">memberOf  ⊑ associatedWith</text>

  <!-- employedBy y=96 -->
  <line x1="54" y1="96" x2="386" y2="96" stroke="#1D9E75" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#1D9E75" x="218" y="92" text-anchor="middle">employedBy  ⊑ associatedWith</text>

  <!-- leadsAt y=118 (dashed) -->
  <line x1="74" y1="118" x2="386" y2="118" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#1D9E75" x="228" y="114" text-anchor="middle">leadsAt  ⊑ employedBy</text>

  <!-- fundedBy y=144 -->
  <line x1="54" y1="144" x2="386" y2="144" stroke="#BA7517" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#BA7517" x="218" y="140" text-anchor="middle">fundedBy  ⊑ associatedWith</text>

  <!-- sponsored y=164 -->
  <line x1="54" y1="164" x2="386" y2="164" stroke="#BA7517" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#BA7517" x="218" y="160" text-anchor="middle">sponsored  ⊑ associatedWith</text>

  <!-- founded y=184 -->
  <line x1="54" y1="184" x2="386" y2="184" stroke="#888780" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="218" y="180" text-anchor="middle">founded  ⊑ associatedWith</text>

  <!-- contributedTo y=204 -->
  <line x1="54" y1="204" x2="386" y2="204" stroke="#888780" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="218" y="200" text-anchor="middle">contributedTo</text>

  <!-- owl:sameAs y=224 (symmetric) -->
  <line x1="54" y1="224" x2="386" y2="224" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="218" y="220" text-anchor="middle">owl:sameAs  (symmetric)</text>

  <!-- activeSince from Person, activeUntil from Collective, converge on xsd:gYear -->
  <line x1="54" y1="248" x2="175" y2="262" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="2 4" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="96" y="249" text-anchor="middle">activeSince</text>
  <line x1="386" y1="248" x2="265" y2="262" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="2 4" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="344" y="249" text-anchor="middle">activeUntil</text>

  <!-- xsd:gYear centred node -->
  <rect x="165" y="264" width="110" height="22" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="220" y="278" text-anchor="middle" dominant-baseline="central">xsd:gYear</text>

  <!-- ══ Collective → Collective self-loops ══ -->

  <!-- hasPartner (symmetric, no arrow) -->
  <path d="M420 46 C444 30 474 36 474 58 C474 80 444 88 420 76" fill="none" stroke="#1D9E75" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="11" fill="#1D9E75" x="482" y="50" text-anchor="start">hasPartner</text>
  <text font-family="sans-serif" font-size="11" fill="#1D9E75" x="482" y="63" text-anchor="start">⊑ assoc. (sym.)</text>

  <!-- acquired -->
  <path d="M420 96 C444 80 472 86 472 106 C472 126 444 134 420 120" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="480" y="100" text-anchor="start">acquired</text>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="480" y="113" text-anchor="start">⊑ associatedWith</text>

  <!-- derivedFrom -->
  <path d="M420 144 C443 128 470 134 470 154 C470 174 444 182 420 168" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="478" y="148" text-anchor="start">derivedFrom</text>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="478" y="161" text-anchor="start">⊑ associatedWith</text>

  <!-- organised -->
  <path d="M420 192 C442 178 468 182 468 200 C468 218 442 226 420 214" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="476" y="196" text-anchor="start">organised</text>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="476" y="209" text-anchor="start">⊑ associatedWith</text>

</svg>
