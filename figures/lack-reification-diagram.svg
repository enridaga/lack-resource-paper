<svg width="100%" viewBox="0 0 680 205" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>LACK RDF reification diagram</title>
  <desc>A binary relation is reified as an rdf:Statement annotated with temporal bounds, evidence source, and provenance.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrs" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ex:Alice -->
  <rect x="80" y="14" width="140" height="40" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489" x="150" y="30" text-anchor="middle" dominant-baseline="central">ex:Alice</text>
  <text font-family="sans-serif" font-size="10" fill="#7F77DD" x="150" y="44" text-anchor="middle" dominant-baseline="central">Person</text>

  <!-- ex:OrgX -->
  <rect x="460" y="14" width="140" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#085041" x="530" y="30" text-anchor="middle" dominant-baseline="central">ex:OrgX</text>
  <text font-family="sans-serif" font-size="10" fill="#1D9E75" x="530" y="44" text-anchor="middle" dominant-baseline="central">Collective</text>

  <!-- base triple arc -->
  <line x1="220" y1="34" x2="460" y2="34" stroke="#BA7517" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="12" font-weight="500" fill="#BA7517" x="340" y="27" text-anchor="middle">fundedBy</text>

  <!-- dashed reification connector -->
  <line x1="340" y1="54" x2="340" y2="78" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="3 3" fill="none" marker-end="url(#arrs)"/>
  <text font-family="sans-serif" font-size="9" fill="#BA7517" x="350" y="68" text-anchor="start">reifies</text>

  <!-- rdf:Statement box -->
  <rect x="115" y="80" width="450" height="38" rx="7" fill="#FFF8EE" stroke="#BA7517" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text font-family="sans-serif" font-size="12" font-weight="500" fill="#633806" x="340" y="94" text-anchor="middle" dominant-baseline="central">rdf:Statement</text>
  <text font-family="sans-serif" font-size="10" fill="#854F0B" x="340" y="108" text-anchor="middle" dominant-baseline="central">rdf:subject ex:Alice  ·  rdf:predicate fundedBy  ·  rdf:object ex:OrgX</text>

  <!-- annotation arcs -->
  <line x1="215" y1="118" x2="100" y2="158" stroke="#888780" stroke-width="0.8" fill="none" marker-end="url(#arrs)"/>
  <line x1="288" y1="118" x2="260" y2="158" stroke="#888780" stroke-width="0.8" fill="none" marker-end="url(#arrs)"/>
  <line x1="392" y1="118" x2="420" y2="158" stroke="#888780" stroke-width="0.8" fill="none" marker-end="url(#arrs)"/>
  <line x1="465" y1="118" x2="570" y2="158" stroke="#888780" stroke-width="0.8" fill="none" marker-end="url(#arrs)"/>

  <!-- arc labels -->
  <text font-family="sans-serif" font-size="10" fill="#5F5E5A" x="144" y="136" text-anchor="middle">since</text>
  <text font-family="sans-serif" font-size="10" fill="#5F5E5A" x="264" y="136" text-anchor="middle">until</text>
  <text font-family="sans-serif" font-size="10" fill="#5F5E5A" x="415" y="134" text-anchor="middle">dct:source</text>
  <text font-family="sans-serif" font-size="10" fill="#5F5E5A" x="530" y="131" text-anchor="middle">prov:wasGeneratedBy</text>

  <!-- value boxes — equal width (150px), 10px gaps, centred -->
  <rect x="25"  y="160" width="150" height="30" rx="5" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="10" fill="#444441" x="100" y="178" text-anchor="middle" dominant-baseline="central">"2010"^^xsd:gYear</text>

  <rect x="185" y="160" width="150" height="30" rx="5" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="10" fill="#444441" x="260" y="178" text-anchor="middle" dominant-baseline="central">"2020"^^xsd:gYear</text>

  <rect x="345" y="160" width="150" height="30" rx="5" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="10" fill="#444441" x="420" y="178" text-anchor="middle" dominant-baseline="central">&lt;https://desmog.com/…&gt;</text>

  <rect x="505" y="160" width="150" height="30" rx="5" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="10" fill="#444441" x="580" y="178" text-anchor="middle" dominant-baseline="central">lackActivity</text>

</svg>
